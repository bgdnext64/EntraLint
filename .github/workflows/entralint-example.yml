name: EntraLint Security Scan

on:
  schedule:
    - cron: "0 6 * * 1"  # Every Monday at 6 AM UTC
  workflow_dispatch:       # Manual trigger

permissions:
  security-events: write  # Required for uploading SARIF
  contents: read
  id-token: write         # Required for workload identity federation

jobs:
  # Workload identity federation (passwordless, no client secret to manage)
  scan-with-wif:
    name: Scan (Workload Identity Federation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          # EntraLint scans Entra ID via Microsoft Graph and does not require an
          # Azure subscription. Allow login for a tenant-scoped service principal
          # that has no subscription role assignment.
          allow-no-subscriptions: true

      - name: Run EntraLint
        uses: bgdnext64/EntraLint@v0.1.1
        with:
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          use-default-credential: "true"
          fail-on: high
